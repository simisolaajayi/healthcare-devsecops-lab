# =============================================================================
# SonarCloud Configuration — MediTrack Health
# =============================================================================
# SonarCloud performs deep code quality and security analysis, including:
#   - OWASP Top 10 vulnerability detection
#   - Code smells (maintainability issues)
#   - Bug detection
#   - Technical debt estimation
#   - Code coverage tracking
#   - Duplicate code detection
#
# Setup:
#   1. Go to https://sonarcloud.io and sign in with your GitHub account
#   2. Import your forked repository
#   3. Copy the project key and organization from the SonarCloud dashboard
#   4. Update the values below with your own project key and organization
#   5. Add SONAR_TOKEN to your GitHub repository secrets
# =============================================================================

# TODO: Replace with your SonarCloud organization name (usually your GitHub username)
sonar.organization=anmutetech

# TODO: Replace with your SonarCloud project key (usually org_repo format)
sonar.projectKey=anmutetech_healthcare-devsecops-lab

# Display name in the SonarCloud dashboard
sonar.projectName=MediTrack DevSecOps

# Source code location
sonar.sources=app

# Test file location
sonar.tests=app/__tests__

# Exclude non-application files from analysis
sonar.exclusions=app/node_modules/**,app/coverage/**,app/public/**,app/vulnerabilities/**

# Exclude test files from source analysis (they are covered by sonar.tests)
sonar.test.inclusions=app/__tests__/**

# Code coverage report (generated by Jest)
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info

# Language
sonar.language=js
