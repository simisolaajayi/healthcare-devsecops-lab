apiVersion: apps/v1
kind: Deployment
metadata:
  name: meditrack-api
  namespace: meditrack
  labels:
    app: meditrack
spec:
  replicas: 3
  selector:
    matchLabels:
      app: meditrack
  template:
    metadata:
      labels:
        app: meditrack
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: meditrack-api
          # TODO: Replace <your-dockerhub-username> with your DockerHub username
          # The pipeline will update this to use the commit SHA (e.g., :abc123)
          image: lincontech/meditrack-api:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: meditrack-config
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tmp-volume
          emptyDir: {}
